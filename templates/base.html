<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Vi{% endblock %}</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<style>
  :root {
    --bg:      #ffffff;
    --surface: #f5f5f5;
    --border:  #e0e0e0;
    --accent:  #2563eb;
    --accent2: #3b82f6;
    --text:    #000000;
    --muted:   #666666;
    --high:    #059669;
    --med:     #d97706;
    --low:     #6b7280;
    --danger:  #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; line-height: 1.8; min-height: 100vh; font-weight: 500; }

  /* Layout */
  .layout { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
  .main { padding: 32px 36px; max-width: 900px; }

  /* Sidebar */
  .sidebar-logo { padding: 0 20px 24px; font-size: 22px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
  .sidebar-logo span { color: var(--text); font-weight: 400; font-size: 13px; display: block; margin-top: 2px; }
  .nav a { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text); text-decoration: none; font-size: 14px; transition: all 0.15s; }
  .nav a:hover, .nav a.active { color: var(--text); background: rgba(124,106,247,0.1); border-right: 2px solid var(--accent); }
  .nav a svg { opacity: 0.7; flex-shrink: 0; }
  .nav-section { padding: 16px 20px 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }

  /* Page elements */
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .subtitle { color: var(--text); font-size: 14px; margin-bottom: 28px; }

  /* Search bar */
  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px 12px 44px; color: var(--text); font-size: 15px; outline: none; transition: border 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text); pointer-events: none; }
  .search-wrap input::placeholder { color: var(--text); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; color: var(--text); }

  /* Contact list */
  .contact-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-decoration: none; color: var(--text); transition: all 0.15s; display: block; }
  .contact-card:hover { border-color: var(--accent); background: #1e2130; transform: translateY(-1px); }
  .contact-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .contact-meta { color: var(--text); font-size: 13px; padding-top: 6px; border-top: 1px solid var(--border); }
  .contact-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; margin-bottom: 12px; color: #fff; }

  /* Memory pills */
  .mem-category { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 2px; }
  .cat-date           { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .cat-event          { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .cat-preference     { background: rgba(52,211,153,0.15); color: #34d399; }
  .cat-commitment     { background: rgba(251,146,60,0.15); color: #fb923c; }
  .cat-recommendation { background: rgba(250,204,21,0.15); color: #fbbf24; }
  .cat-relationship_fact { background: rgba(244,114,182,0.15); color: #f472b6; }
  .cat-emotional      { background: rgba(248,113,113,0.15); color: #f87171; }

  /* Memory rows */
  .memory-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); color: var(--text); }
  .memory-row:last-child { border-bottom: none; }
  .memory-fact { flex: 1; font-size: 15px; color: var(--text); font-weight: 600; }
  .conf-high { color: var(--high); font-size: 12px; }
  .conf-med  { color: var(--med);  font-size: 12px; }
  .conf-low  { color: var(--low);  font-size: 12px; }

  /* Nudge feed */
  .nudge-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); color: var(--text); }
  .nudge-item:last-child { border-bottom: none; }
  .nudge-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; color: var(--text); }
  .nudge-msg { flex: 1; font-size: 14px; color: var(--text); }
  .nudge-time { color: var(--text); font-size: 12px; }
  .nudge-dismiss { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 3px 8px; cursor: pointer; transition: all 0.15s; }
  .nudge-dismiss:hover { border-color: var(--danger); color: var(--danger); }

  /* Form elements */
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--text); margin-bottom: 6px; }
  input[type=text], select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 14px; outline: none; transition: border 0.2s; }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .badge-purple { background: rgba(124,106,247,0.2); color: var(--accent2); }

  /* Search result */
  .result-item { padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; color: var(--text); }
  .result-contact { font-size: 12px; color: var(--text); margin-bottom: 4px; }
  .result-fact { font-size: 15px; color: var(--text); }
  .result-score { font-size: 12px; color: var(--accent2); margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 16px; font-size: 14px; color: var(--text); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; text-decoration: none; }
  .tab.active, .tab:hover { color: var(--text); border-bottom-color: var(--accent); }

  /* Util */
  .empty { color: var(--text); font-size: 14px; padding: 24px 0; }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .mt-4 { margin-top: 16px; }
  .mt-6 { margin-top: 24px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Vi<span>personal intelligence</span></div>
    <nav class="nav">
      <div class="nav-section">Memory</div>
      <a href="/dashboard" {% if page == 'home' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Contacts
      </a>
      <a href="/dashboard/search" {% if page == 'search' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </a>
      <div class="nav-section">System</div>
      <a href="/dashboard/setup" {% if page == 'setup' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Setup & Status
      </a>
      <a href="/dashboard/logs" {% if page == 'logs' %}class="active"{% endif %}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        Logs
      </a>
    </nav>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
<script>
// Filter contact grid by name
function filterContacts(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.contact-card').forEach(el => {
    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
  });
}

// Dismiss nudge
function dismissNudge(id, btn) {
  fetch('/dashboard/nudges/' + id + '/dismiss', {method: 'POST'})
    .then(() => btn.closest('.nudge-item').style.opacity = '0.3');
}
</script>
<!-- Bootstrap JS and Popper.js -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlco4sDC7zWGZlFfdKupM7jX6ZCNXfFWWS0eAXupbkGRppG" crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
