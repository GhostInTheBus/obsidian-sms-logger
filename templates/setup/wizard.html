<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Vi</title>
    <style>
        :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --accent: #7c6af7; --text: #e2e4f0; --muted: #6b7080; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .wizard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 520px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h1 { margin: 0 0 8px; font-size: 28px; color: #fff; }
        p.sub { color: var(--muted); margin-bottom: 32px; font-size: 15px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--accent); }
        .llm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .llm-option { position: relative; }
        .llm-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .llm-option label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 14px 10px; background: var(--bg); border: 2px solid var(--border);
            border-radius: 10px; cursor: pointer; transition: 0.2s; text-transform: none;
            font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0;
            text-align: center; gap: 4px;
        }
        .llm-option label span.hint { font-size: 11px; color: var(--muted); font-weight: 400; }
        .llm-option input[type="radio"]:checked + label { border-color: var(--accent); background: rgba(124,106,247,0.1); color: #fff; }
        .llm-option label:hover { border-color: #4a4d5a; }
        .llm-fields { margin-top: 16px; }
        .llm-field { display: none; }
        .llm-field.active { display: block; }
        .btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #6b5ae6; }
        .footer { margin-top: 24px; font-size: 12px; color: var(--muted); text-align: center; }
        .section-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin: 28px 0 16px; border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="wizard">
        <h1>Welcome to Vi</h1>
        <p class="sub">Let's set up your AI secretary in 60 seconds.</p>
        <form action="/setup/init" method="POST" id="wizardForm">

            <div class="group">
                <label>Your Name</label>
                <input type="text" name="owner_name" placeholder="e.g. Alex" required>
            </div>
            <div class="group">
                <label>Your Phone Number</label>
                <input type="text" name="owner_number" placeholder="Digits only, e.g. 12125551234" required>
            </div>

            <div class="section-label">AI Brain</div>
            <div class="group">
                <label>LLM Backend</label>
                <div class="llm-grid">
                    <div class="llm-option">
                        <input type="radio" name="llm_backend" id="llm_anthropic" value="anthropic" checked>
                        <label for="llm_anthropic">Claude <span class="hint">Anthropic</span></label>
                    </div>
                    <div class="llm-option">
                        <input type="radio" name="llm_backend" id="llm_gemini" value="gemini">
                        <label for="llm_gemini">Gemini <span class="hint">Google</span></label>
                    </div>
                    <div class="llm-option">
                        <input type="radio" name="llm_backend" id="llm_groq" value="groq">
                        <label for="llm_groq">Groq <span class="hint">Fast & free tier</span></label>
                    </div>
                    <div class="llm-option">
                        <input type="radio" name="llm_backend" id="llm_ollama" value="ollama">
                        <label for="llm_ollama">Ollama <span class="hint">Local / offline</span></label>
                    </div>
                </div>

                <div class="llm-fields">
                    <div class="llm-field active" id="field_anthropic">
                        <label>Anthropic API Key</label>
                        <input type="password" name="anthropic_key" placeholder="sk-ant-...">
                    </div>
                    <div class="llm-field" id="field_gemini">
                        <label>Gemini API Key</label>
                        <input type="password" name="gemini_key" placeholder="AIza...">
                        <div style="margin-top:10px;">
                            <label>Gemini Model</label>
                            <select name="gemini_model">
                                <option value="gemini-2.0-flash" selected>gemini-2.0-flash (recommended)</option>
                                <option value="gemini-1.5-pro">gemini-1.5-pro</option>
                                <option value="gemini-1.5-flash">gemini-1.5-flash</option>
                            </select>
                        </div>
                    </div>
                    <div class="llm-field" id="field_groq">
                        <label>Groq API Key</label>
                        <input type="password" name="groq_key" placeholder="gsk_...">
                        <div style="margin-top:10px;">
                            <label>Groq Model</label>
                            <select name="groq_model">
                                <option value="llama-3.1-8b-instant" selected>llama-3.1-8b-instant (fastest)</option>
                                <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile (smarter)</option>
                                <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
                            </select>
                        </div>
                    </div>
                    <div class="llm-field" id="field_ollama">
                        <label>Ollama URL</label>
                        <input type="text" name="ollama_url" placeholder="http://localhost:11434" value="http://localhost:11434">
                        <div style="margin-top:10px;">
                            <label>Model Name</label>
                            <input type="text" name="ollama_model" placeholder="e.g. llama3.1:8b" value="llama3.1:8b">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-label">Personality</div>
            <div class="group">
                <label>Persona Style</label>
                <select name="persona">
                    <option value="friend">Close Friend — warm, casual, caring</option>
                    <option value="professional">Professional — efficient, respectful, formal</option>
                    <option value="assistant" selected>Assistant — helpful, proactive, organized</option>
                    <option value="blend">Blend — warm but efficient, casual but reliable</option>
                </select>
            </div>

            <div class="section-label">Security</div>
            <div class="group">
                <label>Secret Key <span style="font-weight:400;text-transform:none;color:var(--muted)">(webhook auth + dashboard password)</span></label>
                <input type="text" name="webhook_secret" placeholder="e.g. vi-secret-99" required>
            </div>

            <button type="submit" class="btn">Finish Setup →</button>
        </form>
        <div class="footer">Your data stays local. Vi is private by design.</div>
    </div>

    <script>
        const radios = document.querySelectorAll('input[name="llm_backend"]');
        const fields = document.querySelectorAll('.llm-field');
        radios.forEach(r => r.addEventListener('change', () => {
            fields.forEach(f => f.classList.remove('active'));
            const active = document.getElementById('field_' + r.value);
            if (active) active.classList.add('active');
        }));
    </script>
</body>
</html>
